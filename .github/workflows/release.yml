name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libhidapi-hidraw0

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri deb
        run: npm run frontend:build && cargo tauri build --bundles deb --manifest-path src-tauri/Cargo.toml

      - name: Package raw binary tarball
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BINARY="src-tauri/target/release/mrschnirschuhhub"
          tar czf "MrSchnirschuhHub-${TAG}-x86_64-linux.tar.gz" -C "$(dirname "$BINARY")" "$(basename "$BINARY")"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG — MrSchnirschuhHub" \
            src-tauri/target/release/bundle/deb/*.deb \
            MrSchnirschuhHub-*.tar.gz