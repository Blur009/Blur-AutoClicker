name: Support question
description: Ask for help using, building, or troubleshooting Blur Auto Clicker
title: "[Question]: "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you need help using, building, or troubleshooting Blur Auto Clicker.
        Include as much context as you can so other contributors can help quickly.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched the existing issues, pull requests, and documentation before asking.
          required: true

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      placeholder: I am trying to ...
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      placeholder: I already tried ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Blur Auto Clicker version
      description: Example: 3.4.1
      placeholder: 3.4.1
    validations:
      required: true

  - type: input
    id: windows_version
    attributes:
      label: Windows version
      description: Example: Windows 11 24H2
      placeholder: Windows 11 24H2
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: Installation type
      options:
        - Installed release build
        - Built from source
        - Portable or extracted build
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Setup or build
        - Simple mode
        - Advanced mode
        - Settings / General
        - Hotkeys
        - Overlay
        - Installer / Updates
        - Other
    validations:
      required: true

  - type: textarea
    id: relevant_settings
    attributes:
      label: Relevant settings or context
      description: Include any settings, commands, logs, screenshots, or steps that help explain the question.
      placeholder: |
        Hotkey: ctrl+y
        Mode: Toggle
        Command run: npm run dev
