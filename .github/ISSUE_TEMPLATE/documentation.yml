     1|name: Documentation improvement
     2|description: Report missing, unclear, or outdated contributor or user documentation
     3|title: "[Docs]: "
     4|labels:
     5|  - documentation
     6|body:
     7|  - type: markdown
     8|    attributes:
     9|      value: |
    10|        Thanks for helping improve the documentation.
    11|        Please describe what is unclear, outdated, or missing.
    12|
    13|  - type: checkboxes
    14|    id: checks
    15|    attributes:
    16|      label: Checks
    17|      options:
    18|        - label: I searched the existing issues and pull requests for the same documentation problem.
    19|          required: true
    20|
    21|  - type: dropdown
    22|    id: docs_area
    23|    attributes:
    24|      label: Documentation area
    25|      options:
    26|        - README
    27|        - CONTRIBUTING
    28|        - Issue or pull request templates
    29|        - Build or development workflow
    30|        - Release or update documentation
    31|        - Other
    32|    validations:
    33|      required: true
    34|
    35|  - type: textarea
    36|    id: current_problem
    37|    attributes:
    38|      label: Current problem
    39|      description: What is wrong, unclear, missing, or outdated?
    40|      placeholder: The current documentation ...
    41|    validations:
    42|      required: true
    43|
    44|  - type: textarea
    45|    id: suggested_change
    46|    attributes:
    47|      label: Suggested change
    48|      description: Describe the update that would make the documentation more useful.
    49|      placeholder: It should say ...
    50|    validations:
    51|      required: true
    52|
    53|  - type: input
    54|    id: affected_reference
    55|    attributes:
    56|      label: Affected page, file, or reference
    57|      description: Include the doc page, file path, or section when you know it.
    58|      placeholder: Readme.md - Building From Source
    59|    validations:
    60|      required: true
    61|
    62|  - type: textarea
    63|    id: additional_context
    64|    attributes:
    65|      label: Additional context
    66|      description: Add screenshots, links, or any other useful context.
    67|